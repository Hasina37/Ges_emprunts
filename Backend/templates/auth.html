<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — GestEmprunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c14;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border-active: rgba(96,165,250,0.5);
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.35);
            --accent-2: #818cf8;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --error: #f87171;
            --radius: 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            top: -150px; left: -150px;
            border-radius: 50%;
            animation: drift1 12s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(129,140,248,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            border-radius: 50%;
            animation: drift2 15s ease-in-out infinite alternate;
        }

        @keyframes drift1 { to { transform: translate(60px, 80px); } }
        @keyframes drift2 { to { transform: translate(-50px, -60px); } }

        .card {
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 6px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--border-active);
            background: var(--surface-hover);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .error-msg {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.25);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            border: none;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
            margin-top: 8px;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px var(--accent-glow); }
        .btn-primary:active { transform: translateY(0); }

        /* Welcome state */
        .welcome-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .btn-logout {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-logout:hover { background: var(--surface-hover); border-color: rgba(248,113,113,0.4); color: var(--error); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon">📦</div>
        <div class="logo-text">GestEmprunt</div>
    </div>

    {% if request.session.username %}

        <h2>Bonjour 👋</h2>
        <p class="subtitle">Vous êtes connecté à votre espace admin.</p>

        <div class="welcome-box">
            <div class="avatar">👤</div>
            <div>
                <div style="font-weight:600; font-size:16px;">{{ request.session.username }}</div>
                <div style="color:var(--text-muted); font-size:13px;">Administrateur</div>
            </div>
        </div>

        <a href="?action=logout" style="text-decoration:none;">
            <button class="btn-logout">🚪 Se déconnecter</button>
        </a>

    {% else %}

        <h2>Connexion Admin</h2>
        <p class="subtitle">Accédez à votre tableau de bord de gestion.</p>

        {% if erreur %}
        <div class="error-msg">⚠️ {{ erreur }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Se connecter →</button>
        </form>

    {% endif %}
</div>

</body>
</html>
