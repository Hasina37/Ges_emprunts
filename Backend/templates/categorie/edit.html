{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier catégorie — GestEmprunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080c14; --surface: rgba(255,255,255,0.04); --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08); --border-active: rgba(245,158,11,0.5);
            --accent: #f59e0b; --accent-glow: rgba(245,158,11,0.25); --accent-2: #fb923c;
            --orange: #fb923c; --text: #f1f5f9; --text-muted: #64748b;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(251,146,60,0.06) 0%, transparent 70%);
            top: -80px; right: -80px; border-radius: 50%; pointer-events: none;
        }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(8,12,20,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 64px; display: flex; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #818cf8); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.5px; }

        main { max-width: 540px; margin: 0 auto; padding: 56px 24px; }

        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-muted);
            margin-bottom: 32px; animation: fadeUp 0.3s ease both;
        }
        .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .breadcrumb a:hover { color: var(--text); }
        .breadcrumb span { opacity: 0.4; }

        .form-card {
            background: rgba(15,23,42,0.7);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 40px;
            animation: fadeUp 0.4s ease 0.05s both;
        }

        .edit-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(251,146,60,0.1); border: 1px solid rgba(251,146,60,0.2);
            border-radius: 40px; padding: 4px 12px;
            font-size: 11px; color: var(--orange);
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 14px;
        }

        h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 28px; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"] {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 13px 16px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--border-active);
            background-color: var(--surface-hover);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .divider { height: 1px; background: var(--border); margin: 28px 0; }

        .form-actions { display: flex; gap: 12px; align-items: center; }
        .btn-primary {
            flex: 1; background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 10px; padding: 14px; color: #fff;
            font-family: 'Syne', sans-serif; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px var(--accent-glow); }
        .btn-cancel {
            padding: 14px 20px; border: 1px solid var(--border); border-radius: 10px;
            background: transparent; color: var(--text-muted);
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            cursor: pointer; text-decoration: none; transition: all 0.15s;
        }
        .btn-cancel:hover { background: var(--surface); color: var(--text); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header class="topbar">
    <a href="{% url 'dashboard' %}" class="logo">
        <div class="logo-icon">📦</div>
        <div class="logo-text">GestEmprunt</div>
    </a>
</header>

<main>
    <div class="breadcrumb">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <span>/</span>
        <a href="{% url 'categorie_list' %}">Catégories</a>
        <span>/</span>
        <span style="color:var(--text)">Modifier</span>
    </div>

    <div class="form-card">
        <div class="edit-badge">✏ Modification</div>
        <h1>Modifier la catégorie</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Nom de la catégorie</label>
                <input type="text" name="nom" value="{{ categorie.nom }}" required>
            </div>

            <div class="divider"></div>

            <div class="form-actions">
                <a href="{% url 'categorie_list' %}" class="btn-cancel">Annuler</a>
                <button type="submit" class="btn-primary">Sauvegarder →</button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
