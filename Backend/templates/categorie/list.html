
{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catégories — GestEmprunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080c14; --surface: rgba(255,255,255,0.04); --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08); --accent: #f59e0b; --accent-glow: rgba(245,158,11,0.25);
            --accent-2: #fb923c; --red: #f87171; --text: #f1f5f9; --text-muted: #64748b;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 70%);
            top: -100px; right: -100px; border-radius: 50%; pointer-events: none;
        }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(8,12,20,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 64px;
            display: flex; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #818cf8); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.5px; }

        main { max-width: 780px; margin: 0 auto; padding: 48px 24px; }

        .page-header {
            display: flex; align-items: flex-end; justify-content: space-between;
            margin-bottom: 36px; flex-wrap: wrap; gap: 16px;
            animation: fadeUp 0.4s ease both;
        }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .page-header .badge { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 10px; padding: 11px 20px;
            color: #fff; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px;
            cursor: pointer; text-decoration: none;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }

        .list-wrapper {
            background: rgba(15,23,42,0.6);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            animation: fadeUp 0.5s ease 0.1s both;
        }

        .list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: var(--surface-hover); }

        .item-left { display: flex; align-items: center; gap: 14px; }
        .item-icon {
            width: 36px; height: 36px;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .item-name { font-weight: 500; font-size: 15px; }

        .actions { display: flex; gap: 6px; }
        .action-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 12px; border-radius: 8px;
            font-size: 12px; font-weight: 500;
            text-decoration: none; transition: all 0.15s;
            border: 1px solid transparent;
        }
        .action-btn.edit   { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); color: var(--accent); }
        .action-btn.edit:hover   { background: rgba(245,158,11,0.18); }
        .action-btn.delete { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); color: var(--red); }
        .action-btn.delete:hover { background: rgba(248,113,113,0.18); }

        .empty-state { text-align: center; padding: 64px 24px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-muted); font-size: 13px; text-decoration: none;
            margin-top: 28px; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ---- AJOUT : barre de recherche dynamique (ne modifie rien d'autre) ---- */
        .search-wrapper {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .search-wrapper .search-input {
            flex: 1;
        }
        .search-wrapper label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .search-wrapper input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }
        .search-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .search-wrapper .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 20px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-wrapper .reset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        /* ----------------------------------------------------------------- */
    </style>
</head>
<body>

<header class="topbar">
    <a href="{% url 'dashboard' %}" class="logo">
        <div class="logo-icon">📦</div>
        <div class="logo-text">GestEmprunt</div>
    </a>
</header>

<main>
    <div class="page-header">
        <div>
            <h1>🏷️ Catégories</h1>
            <div class="badge">Gestion des catégories d'objets</div>
        </div>
        <a href="{% url 'categorie_create' %}" class="btn-primary">➕ Ajouter catégorie</a>
    </div>

    <!-- ========== BARRE DE RECHERCHE DYNAMIQUE AJOUTÉE ========== -->
    <div class="search-wrapper">
        <div class="search-input">
            <label>🔍 Rechercher en temps réel</label>
            <input type="text" id="dynamicSearch" placeholder="Nom de la catégorie..." autocomplete="off">
        </div>
        <button class="reset-btn" id="resetSearch">Réinitialiser</button>
    </div>
    <!-- ========== FIN DE L'AJOUT ========== -->

    <div class="list-wrapper" id="categoriesList">
        {% for cat in categories %}
        <div class="list-item" data-categorie-nom="{{ cat.nom|lower }}">
            <div class="item-left">
                <div class="item-icon">🏷️</div>
                <span class="item-name">{{ cat.nom }}</span>
            </div>
            <div class="actions">
                <a href="{% url 'categorie_edit' cat.id %}" class="action-btn edit">✏ Modifier</a>
                <a href="{% url 'categorie_delete' cat.id %}" class="action-btn delete">✕ Supprimer</a>
            </div>
        </div>
        {% empty %}
        <div class="empty-state" id="emptyDefault">
            <div class="icon">🏷️</div>
            <p>Aucune catégorie créée</p>
        </div>
        {% endfor %}
    </div>

    <a href="{% url 'dashboard' %}" class="back-link">← Retour au dashboard</a>
</main>

<script>
    (function() {
        const searchInput = document.getElementById('dynamicSearch');
        const resetBtn = document.getElementById('resetSearch');
        const container = document.getElementById('categoriesList');
        const items = Array.from(container.querySelectorAll('.list-item:not(.empty-state)'));
        const emptyDefault = document.getElementById('emptyDefault');

        function filterItems() {
            const term = searchInput.value.trim().toLowerCase();
            let hasVisible = false;

            items.forEach(item => {
                const nom = item.getAttribute('data-categorie-nom') || item.querySelector('.item-name')?.innerText.toLowerCase() || '';
                const matches = nom.includes(term);
                item.style.display = matches ? '' : 'none';
                if (matches) hasVisible = true;
            });

            // Gérer l'affichage du message par défaut ou du message "aucun résultat"
            if (items.length === 0) {
                if (emptyDefault) emptyDefault.style.display = '';
                return;
            }

            // Supprimer un éventuel message dynamique existant
            const existingDynamic = container.querySelector('.dynamic-empty-state');
            if (existingDynamic) existingDynamic.remove();

            if (!hasVisible) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'dynamic-empty-state empty-state';
                emptyDiv.innerHTML = '<div class="icon">🔍</div><p>Aucune catégorie ne correspond à votre recherche</p>';
                container.appendChild(emptyDiv);
            }

            if (emptyDefault) {
                emptyDefault.style.display = 'none';
            }
        }

        searchInput.addEventListener('input', filterItems);
        resetBtn.addEventListener('click', function() {
            searchInput.value = '';
            filterItems();
        });
    })();
</script>

</body>
</html>
